<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>HW2 – llm_vis (All 4 charts, “bad” Scatter)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="style.css" />
  <script src="https://d3js.org/d3.v7.min.js" defer></script>
  <script src="script.js?v=alt4bad" defer></script>
</head>
<body>
  <header class="top">
    <h1>HW2 – llm_vis (Per-Vis Build)</h1>
    <div class="controls">
      <label>Dataset:
        <select id="dataset">
          <option value="route_a.csv" selected>route_a.csv</option>
          <option value="route_b.csv">route_b.csv</option>
          <option value="route_c.csv">route_c.csv</option>
          <option value="route_d.csv">route_d.csv</option>
        </select>
      </label>

      <label>Metric:
        <select id="metric">
          <option value="ridership" selected>ridership</option>
          <option value="on_time_pct">on_time_pct</option>
        </select>
      </label>
    </div>
  </header>

  <main class="grid">
    <section class="chart">
      <h2>Histogram</h2>
      <div id="Histogram-div"></div>
    </section>

    <section class="chart">
      <h2>Line (alt style)</h2>
      <div id="Linechart-div"></div>
    </section>

    <section class="chart">
      <h2>Stacked Area (alt style)</h2>
      <div id="StackedArea-div"></div>
    </section>

    <section class="chart">
      <h2>Scatter (intentionally rough)</h2>
      <div id="Scatterplot-div"></div>
    </section>
  </main>
</body>
</html>
