  <main class="grid">
    <section class="chart">
      <h2>Histogram</h2>

    <section class="chart">
      <h2>Line Chart</h2>
      <div id="Linechart-div"></div>
    </section>

    <section class="chart">
      <h2>Stacked Area</h2>

    <section class="chart">
      <h2>Scatterplot</h2>
      <div id="Scatterplot-div"></div>

  <div id="tooltip" class="vis-tooltip" style="opacity:0"></div>
